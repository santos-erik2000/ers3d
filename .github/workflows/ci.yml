name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://user:pass@localhost:5432/ers3d_ci"
      AUTH_SECRET: "ci-only-secret-not-used-in-production"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Validate migrations (dry run)
        run: npx prisma migrate diff --from-empty --to-schema-datamodel prisma/schema.prisma --script > /dev/null
